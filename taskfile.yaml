# https://taskfile.dev

version: '3'

vars:
  NIGHTLY: nightly-2025-11-02
  TRAMPOLINE_CRATE: crates/uv-trampoline
  TRAMPOLINE_DEST: crates/uv-trampoline-builder/trampolines

tasks:
  default:
    desc: Set up environment, build trampolines, and copy to target folder
    cmds:
      - task: setup
      - task: trampoline:build
      - task: trampoline:copy

  # ---------------------------------------------------------------------------
  # Rustup environment setup
  # ---------------------------------------------------------------------------

  setup:
    desc: Set up the full rustup environment for the current platform
    cmds:
      - task: setup:toolchain
      - task: setup:rust-src
      - task: setup:targets
      - task: setup:cargo-xwin

  setup:toolchain:
    desc: Install the required nightly toolchain (no self-update to avoid file lock)
    cmds:
      - rustup toolchain install {{.NIGHTLY}} --no-self-update

  setup:rust-src:
    desc: Add rust-src component for the current platform
    aliases: ['setup:rust-src:linux', 'setup:rust-src:macos', 'setup:rust-src:windows']
    cmds:
      - rustup component add rust-src --toolchain {{.NIGHTLY}}

  setup:targets:
    desc: Add all cross-compilation targets for the nightly toolchain
    cmds:
      - rustup target add --toolchain {{.NIGHTLY}} i686-pc-windows-msvc
      - rustup target add --toolchain {{.NIGHTLY}} x86_64-pc-windows-msvc
      - rustup target add --toolchain {{.NIGHTLY}} aarch64-pc-windows-msvc

  setup:cargo-xwin:
    desc: Install cargo-xwin for cross-compilation (Linux/macOS only)
    platforms: [linux, darwin]
    cmds:
      - cargo install cargo-xwin

  setup:deps:linux:
    desc: Install system dependencies for cross-compiling on Linux
    platforms: [linux]
    cmds:
      - sudo apt install llvm clang lld

  setup:deps:macos:
    desc: Install system dependencies for cross-compiling on macOS
    platforms: [darwin]
    cmds:
      - brew install llvm

  # ---------------------------------------------------------------------------
  # Build trampolines
  # ---------------------------------------------------------------------------

  trampoline:build:
    desc: Build trampolines for all architectures using the appropriate method
    cmds:
      - task: trampoline:build:i686
      - task: trampoline:build:x86_64
      - task: trampoline:build:aarch64

  # Per-architecture tasks with platform-specific implementations

  trampoline:build:i686:
    desc: Build trampoline for i686
    cmds:
      - task: trampoline:build:xwin:i686
      - task: trampoline:build:native:i686

  trampoline:build:x86_64:
    desc: Build trampoline for x86_64
    cmds:
      - task: trampoline:build:xwin:x86_64
      - task: trampoline:build:native:x86_64

  trampoline:build:aarch64:
    desc: Build trampoline for aarch64
    cmds:
      - task: trampoline:build:xwin:aarch64
      - task: trampoline:build:native:aarch64

  # Cross-compile builds (Linux / macOS via cargo xwin)

  trampoline:build:xwin:i686:
    desc: Cross-compile trampoline for i686 (via cargo xwin)
    platforms: [linux, darwin]
    dir: '{{.TRAMPOLINE_CRATE}}'
    cmds:
      - cargo +{{.NIGHTLY}} xwin build --xwin-arch x86 --release --target i686-pc-windows-msvc

  trampoline:build:xwin:x86_64:
    desc: Cross-compile trampoline for x86_64 (via cargo xwin)
    platforms: [linux, darwin]
    dir: '{{.TRAMPOLINE_CRATE}}'
    cmds:
      - cargo +{{.NIGHTLY}} xwin build --release --target x86_64-pc-windows-msvc

  trampoline:build:xwin:aarch64:
    desc: Cross-compile trampoline for aarch64 (via cargo xwin)
    platforms: [linux, darwin]
    dir: '{{.TRAMPOLINE_CRATE}}'
    cmds:
      - cargo +{{.NIGHTLY}} xwin build --release --target aarch64-pc-windows-msvc

  # Native Windows builds

  trampoline:build:native:i686:
    desc: Build trampoline for i686 natively on Windows
    platforms: [windows]
    dir: '{{.TRAMPOLINE_CRATE}}'
    cmds:
      - cargo build --release --target i686-pc-windows-msvc

  trampoline:build:native:x86_64:
    desc: Build trampoline for x86_64 natively on Windows
    platforms: [windows]
    dir: '{{.TRAMPOLINE_CRATE}}'
    cmds:
      - cargo build --release --target x86_64-pc-windows-msvc

  trampoline:build:native:aarch64:
    desc: Build trampoline for aarch64 natively on Windows
    platforms: [windows]
    dir: '{{.TRAMPOLINE_CRATE}}'
    cmds:
      - cargo build --release --target aarch64-pc-windows-msvc

  # ---------------------------------------------------------------------------
  # Copy prebuilt executables
  # ---------------------------------------------------------------------------

  trampoline:copy:
    desc: Copy built trampolines to uv-trampoline-builder/trampolines
    vars:
      SRC_AARCH64: '{{.TRAMPOLINE_CRATE}}/target/aarch64-pc-windows-msvc/release'
      SRC_X86_64: '{{.TRAMPOLINE_CRATE}}/target/x86_64-pc-windows-msvc/release'
      SRC_I686: '{{.TRAMPOLINE_CRATE}}/target/i686-pc-windows-msvc/release'
    cmds:
      - cmd: cp "{{.SRC_AARCH64}}/uv-trampoline-console.exe" "{{.TRAMPOLINE_DEST}}/uv-trampoline-aarch64-console.exe"
      - cmd: cp "{{.SRC_AARCH64}}/uv-trampoline-gui.exe" "{{.TRAMPOLINE_DEST}}/uv-trampoline-aarch64-gui.exe"
      - cmd: cp "{{.SRC_X86_64}}/uv-trampoline-console.exe" "{{.TRAMPOLINE_DEST}}/uv-trampoline-x86_64-console.exe"
      - cmd: cp "{{.SRC_X86_64}}/uv-trampoline-gui.exe" "{{.TRAMPOLINE_DEST}}/uv-trampoline-x86_64-gui.exe"
      - cmd: cp "{{.SRC_I686}}/uv-trampoline-console.exe" "{{.TRAMPOLINE_DEST}}/uv-trampoline-i686-console.exe"
      - cmd: cp "{{.SRC_I686}}/uv-trampoline-gui.exe" "{{.TRAMPOLINE_DEST}}/uv-trampoline-i686-gui.exe"

  # ---------------------------------------------------------------------------
  # Test trampolines (Windows only)
  # ---------------------------------------------------------------------------

  trampoline:test:
    desc: Smoke test the trampolines
    platforms: [windows]
    cmds:
      - cargo clean
      - cargo run venv
      - cargo run pip install black
      - .venv\Scripts\black --version
